# Synthea properties — El Salvador (Sovereign Synthetic Dataset, Phase 1)
# Overlaid onto a Synthea source checkout by synthea_nemotron.generate.stage().
# Geography files are the SV CSVs we generate from the Nemotron spine + 2024 census.

# --- Exporters -------------------------------------------------------------
exporter.baseDirectory = ./output
exporter.fhir.export = true
exporter.fhir.fhir_version = R4
# US Core profiles do not fit El Salvador; target IPS / a LATAM profile downstream.
exporter.fhir.use_us_core_ig = false
exporter.csv.export = true
exporter.csv.folder_per_run = false
exporter.practitioner.fhir.export = true
exporter.hospital.fhir.export = true
exporter.years_of_history = 0

# --- Geography (SV, generated) --------------------------------------------
generate.geography.country_code = SV
generate.demographics.default_file = geography/sv_demographics.csv
generate.geography.zipcodes.default_file = geography/sv_zipcodes.csv

# --- Payers (simplified SV model) ------------------------------------------
# El Salvador public/social-security/private payers with GENERIC eligibility, so
# Synthea's US Medicaid/Medicare poverty-eligibility files are never loaded.
generate.payers.insurance_companies.default_file = payers/sv_insurance_companies.csv
generate.payers.insurance_plans.default_file = payers/sv_insurance_plans.csv
generate.payers.insurance_plans.eligibilities_file = payers/sv_insurance_eligibilities.csv

# --- Population behaviour ---------------------------------------------------
generate.only_alive_patients = false
generate.append_numbers_to_person_names = false

# Custom SV modules live under resources/modules/sv (dengue, CKDu) and load
# automatically alongside the built-in module set.

# --- Providers (SV facilities) ---------------------------------------------
# One hospital + one primary-care unit per department at the department centroid.
# Without SV providers every patient fails with a null provider.
generate.providers.hospitals.default_file = providers/sv_hospitals.csv
generate.providers.primarycare.default_file = providers/sv_primary_care.csv
generate.providers.default_to_hospital_on_failure = true
