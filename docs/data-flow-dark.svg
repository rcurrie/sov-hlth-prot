<text x="578" y="348" text-anchor="middle" font-size="9.5" fill="#85B7EB">PAHO · WHO ·</text>
<text x="578" y="361" text-anchor="middle" font-size="9.5" fill="#85B7EB">OHDSI network</text>
<line x1="506" y1="372" x2="650" y2="372" stroke="#378ADD" stroke-width="1"/>
<text x="578" y="390" text-anchor="middle" font-size="9" fill="#85B7EB">brings code, not takes data</text>

<path d="M492 344 L393 366" fill="none" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#ab)"/>
