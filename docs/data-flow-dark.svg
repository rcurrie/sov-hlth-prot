<svg width="680" height="624" viewBox="0 0 680 624" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sovereign Health Protocol — data and architecture flow (dark)</title>
<desc>Two feeds — a synthetic staging dataset (Synthea plus a persona spine, zero PHI) and a sovereign health cloud (de-identified FHIR R4 export) — flow into a unified FHIR R4 intake, a FHIR-to-OMOP conversion keeping a matched set, an OMOP CDM v5.4 with a data-quality gate, and an OHDSI analytics and estimator stack, all inside a sovereign boundary on in-country compute. An external partner such as PAHO, WHO, or the OHDSI network deploys standardized surveillance packages as code into the sovereign data, and only aggregated, non-identifiable findings return.</desc>
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#B4B2A9"/></marker>
<marker id="ab" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#85B7EB"/></marker>
<marker id="at" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#5DCAA5"/></marker>
</defs>

<rect x="0" y="0" width="680" height="624" fill="#1b1b1a"/>
<g font-family="Helvetica, Arial, sans-serif">

