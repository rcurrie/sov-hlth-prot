<text x="241" y="263" text-anchor="middle" font-size="9.5" fill="#B4B2A9">matched set kept</text>
<path d="M241 270 L241 286" fill="none" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#ag)"/>

