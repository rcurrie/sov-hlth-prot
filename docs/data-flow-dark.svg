<text x="440" y="393" text-anchor="middle" font-size="9" font-weight="500" fill="#B5D4F4">2</text>

<path d="M26 120 L18 120 L18 545 L24 545" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#at)"/>
<rect x="26" y="528" width="330" height="34" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="44" y="549" font-size="10.5" font-weight="500" fill="#9FE1CB">Synthetic corpus — portable, zero-PHI · shareable across nations</text>

<text x="26" y="582" font-size="9" fill="#A9A79F">Twin-path — build &amp; validate analytics on synthetic (known answer key), then run the same workflows on de-identified production.</text>
<text x="26" y="596" font-size="9" fill="#A9A79F">Federated — ① partner deploys standardized OHDSI surveillance packages in;  ② only aggregated, non-identifiable findings out.</text>
<text x="340" y="616" text-anchor="middle" font-size="10.5" font-weight="500" fill="#ECEAE3">Bring the code to the data — raw patient data never crosses the sovereign boundary.</text>

