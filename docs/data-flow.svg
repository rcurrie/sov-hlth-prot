<svg width="680" height="624" viewBox="0 0 680 624" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sovereign Health Protocol — data and architecture flow</title>
<desc>Two feeds — a synthetic staging dataset (Synthea plus a persona spine, zero PHI) and a sovereign health cloud (de-identified FHIR R4 export) — flow into a unified FHIR R4 intake, a FHIR-to-OMOP conversion keeping a matched set, an OMOP CDM v5.4 with a data-quality gate, and an OHDSI analytics and estimator stack. Everything runs inside a sovereign boundary on in-country compute where no PHI leaves. An external partner such as PAHO, WHO, or the OHDSI network deploys standardized surveillance packages as code into the sovereign data, and only aggregated, non-identifiable findings return — bringing the code to the data. The synthetic corpus is portable, zero-PHI, and shareable across nations.</desc>
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#5F5E5A"/></marker>
<marker id="ab" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#185FA5"/></marker>
<marker id="at" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#0F6E56"/></marker>
</defs>

<rect x="0" y="0" width="680" height="624" fill="#FFFFFF"/>
<g font-family="Helvetica, Arial, sans-serif">

<text x="340" y="28" text-anchor="middle" font-size="20" font-weight="500" fill="#2C2C2A">Sovereign Health Protocol</text>
<text x="340" y="48" text-anchor="middle" font-size="11.5" fill="#5F5E5A">federated, OMOP-standardized health-data engine · in-country compute</text>

<!-- sovereign boundary -->
<rect x="12" y="66" width="458" height="444" rx="14" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="6 5"/>
<text x="24" y="84" font-size="10.5" fill="#5F5E5A">sovereign boundary · in-country compute (no PHI leaves)</text>

<!-- feeds -->
<rect x="26" y="94" width="205" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="128" y="118" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Synthetic staging</text>
<text x="128" y="135" text-anchor="middle" font-size="9.5" fill="#0F6E56">Synthea + persona spine · zero PHI</text>

<rect x="239" y="94" width="205" height="52" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
<text x="341" y="118" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Sovereign health cloud</text>
<text x="341" y="135" text-anchor="middle" font-size="9.5" fill="#993C1D">de-identified FHIR R4 export</text>

<path d="M128 146 L210 166" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/>
<path d="M341 146 L272 166" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/>

<!-- core pipeline -->
<rect x="141" y="168" width="200" height="42" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="241" y="189" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Unified FHIR R4</text>
<text x="241" y="203" text-anchor="middle" font-size="9.5" fill="#5F5E5A">standardized intake</text>
<path d="M241 210 L241 226" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/>

<rect x="141" y="228" width="200" height="42" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="241" y="249" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">FHIR → OMOP</text>
<text x="241" y="263" text-anchor="middle" font-size="9.5" fill="#5F5E5A">matched set kept</text>
<path d="M241 270 L241 286" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/>

<rect x="141" y="288" width="200" height="42" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="241" y="309" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">OMOP CDM v5.4</text>
<text x="241" y="323" text-anchor="middle" font-size="9.5" fill="#5F5E5A">DQD · Achilles gate</text>
<path d="M241 330 L241 346" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/>

<rect x="91" y="348" width="300" height="66" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="241" y="372" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">OHDSI analytics &amp; estimators</text>
<text x="241" y="390" text-anchor="middle" font-size="10" fill="#0F6E56">TTE → IPTW → AIPW / TMLE</text>
<text x="241" y="404" text-anchor="middle" font-size="9.5" fill="#0F6E56">+ standardized surveillance packages</text>
<path d="M241 414 L241 428" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ag)"/>

<!-- bands -->
<rect x="26" y="430" width="418" height="30" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="235" y="450" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">Governance · consent · re-identification risk</text>
<rect x="26" y="468" width="418" height="30" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="235" y="488" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">Sovereign capacity · in-country engineers + clinicians</text>

<!-- federated partner -->
<text x="441" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="#185FA5">bring the code to the data</text>
<rect x="492" y="304" width="172" height="98" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="578" y="330" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">External partner</text>
<text x="578" y="348" text-anchor="middle" font-size="9.5" fill="#185FA5">PAHO · WHO ·</text>
<text x="578" y="361" text-anchor="middle" font-size="9.5" fill="#185FA5">OHDSI network</text>
<line x1="506" y1="372" x2="650" y2="372" stroke="#85B7EB" stroke-width="1"/>
<text x="578" y="390" text-anchor="middle" font-size="9" fill="#185FA5">brings code, not takes data</text>

<path d="M492 344 L393 366" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#ab)"/>
<path d="M391 400 L490 380" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#ab)"/>
<circle cx="440" cy="355" r="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="440" y="358" text-anchor="middle" font-size="9" font-weight="500" fill="#0C447C">1</text>
<circle cx="440" cy="390" r="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="440" y="393" text-anchor="middle" font-size="9" font-weight="500" fill="#0C447C">2</text>

<!-- exportable synthetic corpus -->
<path d="M26 120 L18 120 L18 545 L24 545" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#at)"/>
<rect x="26" y="528" width="330" height="34" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="44" y="549" font-size="10.5" font-weight="500" fill="#085041">Synthetic corpus — portable, zero-PHI · shareable across nations</text>

<!-- captions -->
<text x="26" y="582" font-size="9" fill="#5F5E5A">Twin-path — build &amp; validate analytics on synthetic (known answer key), then run the same workflows on de-identified production.</text>
<text x="26" y="596" font-size="9" fill="#5F5E5A">Federated — ① partner deploys standardized OHDSI surveillance packages in;  ② only aggregated, non-identifiable findings out.</text>
<text x="340" y="616" text-anchor="middle" font-size="10.5" font-weight="500" fill="#2C2C2A">Bring the code to the data — raw patient data never crosses the sovereign boundary.</text>

</g>
</svg>
